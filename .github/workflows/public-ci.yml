name: Public CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  public-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit public tree
        run: python3 tools/release/public_audit.py --scope tracked
      - name: Run public fixture tests
        run: make public-test
